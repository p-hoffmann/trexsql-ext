volumes:
  core-pgdata:
  devx-workspaces:

services:
  postgres:
    image: postgres:16
    container_name: trexsql-postgres
    ports:
      - 65433:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mypass
      POSTGRES_DB: testdb
    volumes:
      - core-pgdata:/var/lib/postgresql/data
      - ./core/seed.sql:/docker-entrypoint-initdb.d/seed.sql
      - ./core/schema:/docker-entrypoint-initdb.d/schema
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  trex:
    image: ghcr.io/p-hoffmann/trexsql:latest
    platform: linux/amd64
    ports:
      - 8000:8000
      - 8001:8001
      - 5433:5432
    # volumes:
    #   - ./core/server:/usr/src/core/server
    #   - ./functions:/usr/src/functions
    #   - ./plugins-dev:/usr/src/plugins-dev
    #   - ./plugins/docs:/usr/src/plugins/@trex/docs
    #   - ./plugins/web/dist:/usr/src/plugins/@trex/web/dist
    volumes:
      - devx-workspaces:/tmp/devx-workspaces
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:mypass@postgres:5432/testdb
      BETTER_AUTH_SECRET: dev-secret-at-least-32-characters-long!!
      BASE_PATH: /trex
      BETTER_AUTH_URL: http://localhost:8001/trex
      PLUGINS_INFORMATION_URL: "https://feeds.dev.azure.com/data2evidence/d2e/_apis/packaging/Feeds/d2e/packages?api-version=7.1&includeDescription=true"
      TPM_REGISTRY_URL: "https://pkgs.dev.azure.com/data2evidence/d2e/_packaging/d2e/npm/registry"
      PLUGINS_PATH: /usr/src/plugins
      PLUGINS_DEV_PATH: /usr/src/plugins-dev
      SCHEMA_DIR: /usr/src/core/schema
      SWARM_CONFIG: >-
        {"cluster_id":"local","nodes":{"local":{"gossip_addr":"0.0.0.0:4200","extensions":[{"name":"trexas","config":{"host":"0.0.0.0","port":8001,"main_service_path":"/usr/src/core/server","event_worker_path":"/usr/src/core/event","tls_port":8000,"tls_cert_path":"/usr/src/server.crt","tls_key_path":"/usr/src/server.key"}},{"name":"pgwire","config":{"host":"0.0.0.0","port":5432}}]}}}
      SWARM_NODE: local
      POSTGREST_HOST: postgrest
      POSTGREST_PORT: "3000"

  postgrest:
    image: postgrest/postgrest:v12.2.3
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:authenticator_pass@postgres:5432/testdb
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: dev-secret-at-least-32-characters-long!!
      PGRST_DB_PRE_REQUEST: public.postgrest_pre_request
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:8001/trex/rest/v1
