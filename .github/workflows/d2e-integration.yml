name: D2E Integration Tests

permissions:
  contents: read
  checks: write
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      d2e_branch:
        description: 'D2E branch to test against'
        default: 'develop'
        type: string
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, ready_for_review, reopened, synchronize]

env:
  D2E_BRANCH: ${{ github.event.inputs.d2e_branch || 'develop' }}
  TREXSQL_VERSION: v1.4.4-trex
  VERSION: develop
  PLUGINS_SEED: '["d2e-flows", "d2e-ui", "d2e-atlas", "data-transformation-flow", "hades-flow", "trex-hana", "trex-pgwire", "d2e-fhir-server", "i2b2-flow", "data-management-flow"]'

jobs:
  build-extension:
    runs-on: ubuntu-24.04
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install curl unzip libopenblas-dev libglib2.0-dev

      - name: Install TrexSQL library
        run: |
          curl --retry 3 --retry-delay 5 --retry-all-errors -L -O https://github.com/p-hoffmann/trexsql-rs/releases/download/${{ env.TREXSQL_VERSION }}/libtrexsql-linux-amd64.zip
          unzip libtrexsql-linux-amd64.zip
          sudo cp duckdb.h /usr/local/include/
          sudo cp libtrexsql.so /usr/local/lib/
          sudo ldconfig

      - name: Setup Rust
        working-directory: plugins/runtime
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: plugins/runtime

      - name: Clean V8 cache
        working-directory: plugins/runtime
        run: rm -rf target/*/gn_out target/*/obj/librusty_v8.a || true

      - name: Build extension
        working-directory: plugins/runtime
        run: |
          make configure
          make release

      - name: Sign extension
        working-directory: plugins/runtime
        env:
          DUCKDB_EXTENSION_SIGNING_KEY: ${{ secrets.DUCKDB_EXTENSION_SIGNING_KEY }}
        run: |
          ./extension-ci-tools/extension_signing/sign-if-key.sh build/release

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: trexas-extension
          path: plugins/runtime/build/release/trexas.trex
          retention-days: 1
          if-no-files-found: error

  build-d2e-images:
    needs: build-extension
    runs-on: ubuntu-24.04
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Increase swap to 15G
        run: |
          sudo swapoff -a
          sudo fallocate -l 15G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Download extension artifact
        uses: actions/download-artifact@v4
        with:
          name: trexas-extension
          path: ./trexas-artifact

      - name: Checkout D2E
        uses: actions/checkout@v4
        with:
          repository: OHDSI/Data2Evidence
          ref: ${{ env.D2E_BRANCH }}
          path: d2e
          submodules: recursive

      # Temporarily disabled to test if e2e failure is from the extension or the D2E setup.
      # - name: Inject local extension into D2E
      #   run: |
      #     # Copy our built extension to D2E's services/trex directory
      #     cp ./trexas-artifact/trexas.trex ./d2e/services/trex/local-trexas.trex
      #
      #     # Insert COPY instruction after 'RUN npm install' in Dockerfile (flexible pattern)
      #     sed -i '/RUN npm install/a\COPY local-trexas.trex /usr/src/node_modules/@trex/as/trexas.trex' ./d2e/services/trex/Dockerfile
      #
      #     # Verify modification succeeded
      #     echo "=== Modified Dockerfile (relevant section) ==="
      #     grep -A2 "RUN npm install" ./d2e/services/trex/Dockerfile
      #     if ! grep -q "COPY local-trexas.trex" ./d2e/services/trex/Dockerfile; then
      #       echo "ERROR: Failed to inject local extension into Dockerfile"
      #       exit 1
      #     fi

      - name: Setup D2E
        working-directory: d2e
        run: npm install

      - name: Patch seed config for e2e tests
        working-directory: d2e
        run: node ./scripts/patch-seed-for-e2e.js

      - name: Initialize D2E
        working-directory: d2e
        run: |
          init_choice=y ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} init

      - name: Build D2E Docker images
        working-directory: d2e
        run: |
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions build
          docker images --format "table {{.ID}}\t{{.Repository}}\t{{.Tag}}"

      - name: Build e2e Docker image
        working-directory: d2e/tests/e2e
        run: docker build -t d2e-e2e .

      - name: Prune build cache
        run: docker buildx prune -af

      - name: Save Docker images
        run: |
          # Save all non-dangling images (excluding base images like ubuntu, node, etc.)
          IMAGES=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep -v '<none>' | grep -vE '^(ubuntu|node|postgres|docker|alpine|debian|caddy|redis):')
          echo "Saving images:"
          echo "$IMAGES"
          docker save $IMAGES | zstd -T0 -3 -o /tmp/d2e-images.tar.zst

      - name: Save D2E workspace
        run: |
          tar cf - \
            -C d2e \
            .env \
            scripts/dist \
            deploy/caddy-config \
            functions \
            docker-compose.yml \
            docker-compose.*.yml \
            package.json \
            node_modules/.package-lock.json \
            2>/dev/null | zstd -T0 -3 -o /tmp/d2e-workspace.tar.zst || true

      - name: Upload Docker images artifact
        uses: actions/upload-artifact@v4
        with:
          name: d2e-docker-images
          path: /tmp/d2e-images.tar.zst
          retention-days: 1
          if-no-files-found: error

      - name: Upload D2E workspace artifact
        uses: actions/upload-artifact@v4
        with:
          name: d2e-workspace
          path: /tmp/d2e-workspace.tar.zst
          retention-days: 1
          if-no-files-found: error

      - name: Prune system
        if: always()
        run: docker system prune -af

  run-e2e-tests:
    needs: build-d2e-images
    runs-on: ubuntu-24.04
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Download Docker images artifact
        uses: actions/download-artifact@v4
        with:
          name: d2e-docker-images
          path: /tmp

      - name: Load Docker images
        run: |
          zstd -dc /tmp/d2e-images.tar.zst | docker load
          rm /tmp/d2e-images.tar.zst
          docker images --format "table {{.ID}}\t{{.Repository}}\t{{.Tag}}"

      - name: Checkout D2E
        uses: actions/checkout@v4
        with:
          repository: OHDSI/Data2Evidence
          ref: ${{ env.D2E_BRANCH }}
          path: d2e
          submodules: recursive

      - name: Download D2E workspace artifact
        uses: actions/download-artifact@v4
        with:
          name: d2e-workspace
          path: /tmp

      - name: Restore D2E workspace
        run: |
          zstd -dc /tmp/d2e-workspace.tar.zst | tar xf - -C d2e
          rm /tmp/d2e-workspace.tar.zst

      - name: Increase swap to 15G
        run: |
          sudo swapoff -a
          sudo fallocate -l 15G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Setup D2E
        working-directory: d2e
        run: npm install

      - name: Start D2E services
        uses: nick-fields/retry@v3
        with:
          timeout_seconds: 1800
          retry_wait_seconds: 100
          max_attempts: 2
          command: |
            cd d2e
            ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions start
            docker ps --format "{{.Names}},{{.Status}}"

      - name: Wait for services to be healthy
        timeout-minutes: 5
        run: |
          echo "Waiting for d2e-trex to become healthy..."
          until [ "$(docker inspect -f '{{.State.Health.Status}}' d2e-trex 2>/dev/null)" = "healthy" ]; do
            echo "  d2e-trex: $(docker inspect -f '{{.State.Health.Status}}' d2e-trex 2>/dev/null || echo 'not found')"
            sleep 5
          done
          echo "d2e-trex is healthy"
          docker ps --format "{{.Names}},{{.Status}}"

      - name: Run setupdemo
        uses: nick-fields/retry@v3
        with:
          timeout_seconds: 1800
          retry_wait_seconds: 100
          max_attempts: 2
          command: |
            cd d2e
            ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions setupdemo

      - name: Run checkflow
        uses: nick-fields/retry@v3
        with:
          timeout_seconds: 1800
          max_attempts: 1
          command: |
            cd d2e
            ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions checkflow

      - name: Logs after checkflow
        if: success() || failure()
        working-directory: d2e
        run: |
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions logs

      - name: Check app status (informational)
        continue-on-error: true
        run: |
          echo "=== Checking if app is reachable ==="
          HTTP_CODE=$(curl -k -s -o /dev/null -w "%{http_code}" https://localhost:443/d2e/portal || echo "000")
          echo "HTTP Status: $HTTP_CODE"
          curl -k -I https://localhost:443/d2e/portal || true

      - name: Restart d2e services
        working-directory: d2e
        run: |
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions stop
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions start

      - name: Wait for d2e-trex healthy after restart
        timeout-minutes: 5
        run: |
          until [ "$(docker inspect -f '{{.State.Health.Status}}' d2e-trex 2>/dev/null)" = "healthy" ]; do
            echo "  d2e-trex: $(docker inspect -f '{{.State.Health.Status}}' d2e-trex 2>/dev/null || echo 'not found')"
            sleep 5
          done
          echo "d2e-trex is healthy"

      - name: Wait for d2e-ui plugin to be installed
        run: |
          echo "Waiting for d2e-ui plugin to be installed..."
          max_attempts=60
          attempt=0
          start_time=$(date +%s)
          while [ $attempt -lt $max_attempts ]; do
            if docker exec d2e-trex ls /usr/src/data/plugins/@data2evidence/d2e-ui/resources/portal >/dev/null 2>&1; then
              end_time=$(date +%s)
              elapsed=$((end_time - start_time))
              echo "d2e-ui plugin is ready (took ${elapsed}s)"
              break
            fi
            attempt=$((attempt + 1))
            echo "  Attempt $attempt/$max_attempts: waiting..."
            sleep 2
          done
          if [ $attempt -eq $max_attempts ]; then
            echo "Timeout waiting for d2e-ui plugin to be installed"
            exit 1
          fi

      - name: Wait for webapi-init to complete
        run: |
          echo "Waiting for webapi-init to complete (ensures logto admin user is created)..."
          for i in $(seq 1 60); do
            if docker ps -a --filter "name=webapi-init" --format '{{.Status}}' | grep -q "Exited (0)"; then
              echo "webapi-init completed successfully"
              break
            fi
            if docker ps -a --filter "name=webapi-init" --format '{{.Status}}' | grep -qE "Exited \([1-9]"; then
              echo "webapi-init failed!"
              docker logs d2e-webapi-init || true
              exit 1
            fi
            echo "Waiting for webapi-init... ($i/60)"
            sleep 5
          done

      - name: Disable IPv6 to prevent ERR_NETWORK_CHANGED
        run: sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1

      - name: Run e2e tests
        working-directory: d2e/tests/e2e
        timeout-minutes: 45
        run: |
          docker run --rm \
            --network=host \
            --ipc=host \
            -v "$(pwd)/test-results:/work/test-results" \
            -v "$(pwd)/ctrf:/work/ctrf" \
            -e D2E_BASE_URL=https://localhost:443 \
            -e CI=true \
            -e GITHUB_ACTIONS=true \
            d2e-e2e npm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: d2e-test-results
          path: d2e/tests/e2e/test-results/**/*
          if-no-files-found: warn

      - name: Publish Test Report
        if: always()
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: "./d2e/tests/e2e/ctrf/*.json"
          file-report: true

      - name: Collect logs on failure
        if: failure()
        working-directory: d2e
        run: |
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions logs

      - name: Stop D2E services
        if: always()
        working-directory: d2e
        run: |
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions stop

      - name: Prune system
        if: always()
        run: docker system prune -af
