name: D2E Integration Tests

permissions:
  contents: read
  checks: write
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      d2e_branch:
        description: 'D2E branch to test against'
        default: 'develop'
        type: string
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, ready_for_review, reopened, synchronize]

env:
  D2E_BRANCH: ${{ github.event.inputs.d2e_branch || 'develop' }}
  TREXSQL_VERSION: v1.4.4-trex
  VERSION: develop
  PLUGINS_SEED: '["d2e-flows", "d2e-ui", "d2e-atlas", "data-transformation-flow", "hades-flow", "trex-hana", "trex-pgwire", "d2e-fhir-server", "i2b2-flow", "data-management-flow"]'

jobs:
  build-extension:
    runs-on: ubuntu-24.04
    if: github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        ext:
          # plugin_dir: location under plugins/
          # file:       produced .trex filename (matches EXTENSION_NAME in plugin Makefile)
          # mount:      target path inside d2e-trex container (npm package location)
          - { plugin_dir: runtime, file: trexas.trex,    mount: /usr/src/node_modules/@trex/as/trexas.trex }
          - { plugin_dir: atlas,   file: circe.trex,     mount: /usr/src/node_modules/@trex/circe/circe.trex }
          - { plugin_dir: hana,    file: hana_scan.trex, mount: /usr/src/node_modules/@trex/hana/hana_scan.trex }
          - { plugin_dir: pgwire,  file: pgwire.trex,    mount: /usr/src/node_modules/@trex/pgwire/pgwire.trex }
          - { plugin_dir: fhir,    file: fhir.trex,      mount: /usr/src/node_modules/@trex/fhir/fhir.trex }
          - { plugin_dir: pool,    file: pool.trex,      mount: /usr/src/node_modules/@trex/pool/pool.trex }
          - { plugin_dir: tpm,     file: tpm.trex,       mount: /usr/src/node_modules/@trex/tpm/tpm.trex }
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install curl unzip libopenblas-dev libglib2.0-dev

      - name: Install TrexSQL library
        run: |
          curl --retry 3 --retry-delay 5 --retry-all-errors -L -O https://github.com/p-hoffmann/trexsql-rs/releases/download/${{ env.TREXSQL_VERSION }}/libtrexsql-linux-amd64.zip
          unzip libtrexsql-linux-amd64.zip
          sudo cp duckdb.h /usr/local/include/
          sudo cp libtrexsql.so /usr/local/lib/
          sudo ldconfig

      - name: Setup Rust
        working-directory: plugins/${{ matrix.ext.plugin_dir }}
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: plugins/${{ matrix.ext.plugin_dir }}

      - name: Clean V8 cache
        working-directory: plugins/${{ matrix.ext.plugin_dir }}
        run: rm -rf target/*/gn_out target/*/obj/librusty_v8.a || true

      - name: Build extension
        working-directory: plugins/${{ matrix.ext.plugin_dir }}
        run: |
          make configure
          make release

      - name: Sign extension
        working-directory: plugins/${{ matrix.ext.plugin_dir }}
        env:
          DUCKDB_EXTENSION_SIGNING_KEY: ${{ secrets.DUCKDB_EXTENSION_SIGNING_KEY }}
        run: |
          ./extension-ci-tools/extension_signing/sign-if-key.sh build/release

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: trex-ext-${{ matrix.ext.plugin_dir }}
          path: plugins/${{ matrix.ext.plugin_dir }}/build/release/${{ matrix.ext.file }}
          retention-days: 1
          if-no-files-found: error

  run-e2e-tests:
    needs: build-extension
    runs-on: ubuntu-24.04
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Increase swap to 15G
        run: |
          sudo swapoff -a
          sudo fallocate -l 15G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Download extension artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: trex-ext-*
          path: ./trex-artifacts
          merge-multiple: true

      - name: Checkout D2E
        uses: actions/checkout@v4
        with:
          repository: OHDSI/Data2Evidence
          ref: ${{ env.D2E_BRANCH }}
          path: d2e
          submodules: recursive

      - name: Setup D2E
        working-directory: d2e
        run: npm install

      - name: Patch seed config for e2e tests
        working-directory: d2e
        run: node ./scripts/patch-seed-for-e2e.js

      - name: Initialize D2E
        working-directory: d2e
        run: |
          init_choice=y ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} init

      - name: Stage trex extensions for mount
        run: |
          # Collect every locally-built .trex into d2e/.ci-overlay/ so the compose override can bind-mount them.
          mkdir -p d2e/.ci-overlay
          cp ./trex-artifacts/*.trex d2e/.ci-overlay/
          ls -l d2e/.ci-overlay/

      - name: Create CI compose override
        run: |
          # Override the trex service to:
          #   - skip local build and pull ghcr.io/ohdsi/d2e-trex:develop instead
          #   - bind-mount each locally-built .trex over the corresponding npm-installed file
          # Also override caddy port for CI host networking.
          cat > d2e/docker-compose-ci.yml << 'EOF'
          services:
            alp-caddy:
              ports: !override
                - ${CADDY_PORT:-${PORT:-443}}:443
            trex:
              build: !reset null
              image: ${DOCKER_IMAGE_PREFIX:-ghcr.io/ohdsi/}d2e-trex:${DOCKER_TAG_NAME:-develop}
              pull_policy: always
              volumes:
                - ./.ci-overlay/trexas.trex:/usr/src/node_modules/@trex/as/trexas.trex:ro
                - ./.ci-overlay/circe.trex:/usr/src/node_modules/@trex/circe/circe.trex:ro
                - ./.ci-overlay/hana_scan.trex:/usr/src/node_modules/@trex/hana/hana_scan.trex:ro
                - ./.ci-overlay/pgwire.trex:/usr/src/node_modules/@trex/pgwire/pgwire.trex:ro
                - ./.ci-overlay/fhir.trex:/usr/src/node_modules/@trex/fhir/fhir.trex:ro
                - ./.ci-overlay/pool.trex:/usr/src/node_modules/@trex/pool/pool.trex:ro
                - ./.ci-overlay/tpm.trex:/usr/src/node_modules/@trex/tpm/tpm.trex:ro
          EOF
          cat d2e/docker-compose-ci.yml

      - name: Start D2E services
        uses: nick-fields/retry@v3
        with:
          timeout_seconds: 1800
          retry_wait_seconds: 100
          max_attempts: 2
          command: |
            cd d2e
            ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions -c ./docker-compose-ci.yml --pull start
            docker ps --format "{{.Names}},{{.Status}}"
            docker images --format "table {{.ID}}\t{{.Repository}}\t{{.Tag}}"

      - name: Wait for services to be healthy
        timeout-minutes: 5
        run: |
          echo "Waiting for d2e-trex to become healthy..."
          until [ "$(docker inspect -f '{{.State.Health.Status}}' d2e-trex 2>/dev/null)" = "healthy" ]; do
            echo "  d2e-trex: $(docker inspect -f '{{.State.Health.Status}}' d2e-trex 2>/dev/null || echo 'not found')"
            sleep 5
          done
          echo "d2e-trex is healthy"
          docker ps --format "{{.Names}},{{.Status}}"

      - name: Run setupdemo
        uses: nick-fields/retry@v3
        with:
          timeout_seconds: 1800
          retry_wait_seconds: 100
          max_attempts: 2
          command: |
            cd d2e
            ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions -c ./docker-compose-ci.yml setupdemo

      - name: Run checkflow
        uses: nick-fields/retry@v3
        with:
          timeout_seconds: 1800
          max_attempts: 1
          command: |
            cd d2e
            ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions -c ./docker-compose-ci.yml checkflow

      - name: Logs after checkflow
        if: success() || failure()
        working-directory: d2e
        run: |
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions -c ./docker-compose-ci.yml logs

      - name: Check app status (informational)
        continue-on-error: true
        run: |
          echo "=== Checking if app is reachable ==="
          HTTP_CODE=$(curl -k -s -o /dev/null -w "%{http_code}" https://localhost:443/d2e/portal || echo "000")
          echo "HTTP Status: $HTTP_CODE"
          curl -k -I https://localhost:443/d2e/portal || true

      - name: Restart d2e services
        working-directory: d2e
        run: |
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions -c ./docker-compose-ci.yml stop
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions -c ./docker-compose-ci.yml start

      - name: Wait for d2e-trex healthy after restart
        timeout-minutes: 5
        run: |
          until [ "$(docker inspect -f '{{.State.Health.Status}}' d2e-trex 2>/dev/null)" = "healthy" ]; do
            echo "  d2e-trex: $(docker inspect -f '{{.State.Health.Status}}' d2e-trex 2>/dev/null || echo 'not found')"
            sleep 5
          done
          echo "d2e-trex is healthy"

      - name: Wait for d2e-ui plugin to be installed
        run: |
          echo "Waiting for d2e-ui plugin to be installed..."
          max_attempts=60
          attempt=0
          start_time=$(date +%s)
          while [ $attempt -lt $max_attempts ]; do
            if docker exec d2e-trex ls /usr/src/data/plugins/@data2evidence/d2e-ui/resources/portal >/dev/null 2>&1; then
              end_time=$(date +%s)
              elapsed=$((end_time - start_time))
              echo "d2e-ui plugin is ready (took ${elapsed}s)"
              break
            fi
            attempt=$((attempt + 1))
            echo "  Attempt $attempt/$max_attempts: waiting..."
            sleep 2
          done
          if [ $attempt -eq $max_attempts ]; then
            echo "Timeout waiting for d2e-ui plugin to be installed"
            exit 1
          fi

      - name: Wait for webapi-init to complete
        run: |
          echo "Waiting for webapi-init to complete (ensures logto admin user is created)..."
          for i in $(seq 1 60); do
            if docker ps -a --filter "name=webapi-init" --format '{{.Status}}' | grep -q "Exited (0)"; then
              echo "webapi-init completed successfully"
              break
            fi
            if docker ps -a --filter "name=webapi-init" --format '{{.Status}}' | grep -qE "Exited \([1-9]"; then
              echo "webapi-init failed!"
              docker logs d2e-webapi-init || true
              exit 1
            fi
            echo "Waiting for webapi-init... ($i/60)"
            sleep 5
          done

      - name: Disable IPv6 to prevent ERR_NETWORK_CHANGED
        run: sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1

      - name: Build e2e Docker image
        working-directory: d2e/tests/e2e
        run: docker build -t d2e-e2e .

      - name: Run e2e tests
        working-directory: d2e/tests/e2e
        timeout-minutes: 45
        run: |
          docker run --rm \
            --network=host \
            --ipc=host \
            -v "$(pwd)/test-results:/work/test-results" \
            -v "$(pwd)/ctrf:/work/ctrf" \
            -e D2E_BASE_URL=https://localhost:443 \
            -e CI=true \
            -e GITHUB_ACTIONS=true \
            d2e-e2e npm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: d2e-test-results
          path: d2e/tests/e2e/test-results/**/*
          if-no-files-found: warn

      - name: Publish Test Report
        if: always()
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: "./d2e/tests/e2e/ctrf/*.json"
          file-report: true

      - name: Collect logs on failure
        if: failure()
        working-directory: d2e
        run: |
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions -c ./docker-compose-ci.yml logs

      - name: Stop D2E services
        if: always()
        working-directory: d2e
        run: |
          ENV_TYPE=remote CADDY__CONFIG=./deploy/caddy-config node ./scripts/dist/cli.js -e -v ${{ env.VERSION }} -d ./functions -c ./docker-compose-ci.yml stop

      - name: Prune system
        if: always()
        run: docker system prune -af
