# ---------------------------------------------------------------------------
# WARNING: the default credentials in this file are for local development
# only. Override via a .env file (POSTGRES_PASSWORD, BETTER_AUTH_SECRET,
# PGRST_JWT_SECRET, REALTIME_DB_PASSWORD, REALTIME_DB_ENC_KEY,
# REALTIME_SECRET_KEY_BASE, REALTIME_METRICS_JWT_SECRET) before exposing this stack to anything outside
# your laptop. The trex container will, on startup, replace any known-default
# placeholder values with random ones and print them to stdout — but those
# random values do NOT survive a container restart unless persisted via
# the env. Set TREX_PRODUCTION_MODE=1 to make the container refuse to start
# when default placeholders are still in effect.
# ---------------------------------------------------------------------------

volumes:
  core-pgdata:
  claude-config:
  gh-config:

services:
  postgres:
    image: postgres:16
    container_name: trexsql-postgres
    ports:
      - 65433:5432
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mypass}
      POSTGRES_DB: testdb
    volumes:
      - core-pgdata:/var/lib/postgresql/data
      - ./core/seed.sql:/docker-entrypoint-initdb.d/seed.sql
      - ./core/schema:/docker-entrypoint-initdb.d/schema
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  trex:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: ghcr.io/p-hoffmann/trexsql:dev
    ports:
      - 8000:8000
      - 8001:8001
      - 5433:5432
    volumes:
      # Mount source directories for live development (no rebuild needed)
      - ./core/server:/usr/src/core/server
      - ./core/event:/usr/src/core/event
      - ./functions:/usr/src/functions
      - ./plugins/web/dist:/usr/src/plugins-dev/web/dist
      - ./plugins/notebook/dist:/usr/src/plugins-dev/notebook/dist
      - ./plugins/storage:/usr/src/plugins-dev/storage
      - claude-config:/home/node/.claude
      - gh-config:/home/node/.config/gh
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-mypass}@postgres:5432/testdb
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-secret-at-least-32-characters-long!!}
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET:-${BETTER_AUTH_SECRET:-dev-secret-at-least-32-characters-long!!}}
      TREX_PRODUCTION_MODE: ${TREX_PRODUCTION_MODE:-0}
      BASE_PATH: /trex
      BETTER_AUTH_URL: http://localhost:8001/trex
      PLUGINS_INFORMATION_URL: "https://feeds.dev.azure.com/data2experience/d2e/_apis/packaging/Feeds/d2e/packages?api-version=7.1&includeDescription=true"
      TPM_REGISTRY_URL: "https://pkgs.dev.azure.com/data2experience/d2e/_packaging/d2e/npm/registry"
      PLUGINS_PATH: /usr/src/plugins
      PLUGINS_DEV_PATH: /usr/src/plugins-dev
      SCHEMA_DIR: /usr/src/core/schema
      SWARM_CONFIG: >-
        {"cluster_id":"local","nodes":{"local":{"gossip_addr":"0.0.0.0:4200","extensions":[{"name":"trexas","config":{"host":"0.0.0.0","port":8001,"main_service_path":"/usr/src/core/server","event_worker_path":"/usr/src/core/event","tls_port":8000,"tls_cert_path":"/usr/src/server.crt","tls_key_path":"/usr/src/server.key"}},{"name":"pgwire","config":{"host":"0.0.0.0","port":5432}}]}}}
      SWARM_NODE: local
      POSTGREST_HOST: postgrest
      POSTGREST_PORT: "3000"

  postgrest:
    image: postgrest/postgrest:v12.2.3
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:authenticator_pass@postgres:5432/testdb
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET:-${BETTER_AUTH_SECRET:-dev-secret-at-least-32-characters-long!!}}
      PGRST_DB_PRE_REQUEST: public.postgrest_pre_request
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:8001/trex/rest/v1

  realtime:
    image: supabase/realtime:v2.93.3
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "4000"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: testdb
      DB_USER: supabase_admin
      DB_PASSWORD: ${REALTIME_DB_PASSWORD:-realtime_admin_pass}
      DB_AFTER_CONNECT_QUERY: SET search_path TO _realtime
      DB_ENC_KEY: ${REALTIME_DB_ENC_KEY:-supabaserealtime}
      API_JWT_SECRET: ${PGRST_JWT_SECRET:-${BETTER_AUTH_SECRET:-dev-secret-at-least-32-characters-long!!}}
      METRICS_JWT_SECRET: ${PGRST_JWT_SECRET:-${BETTER_AUTH_SECRET:-dev-secret-at-least-32-characters-long!!}}
      SECRET_KEY_BASE: ${REALTIME_SECRET_KEY_BASE:-UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1/u2oq}
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      RLIMIT_NOFILE: "10000"
      APP_NAME: realtime
      SEED_SELF_HOST: "true"
      RUN_JANITOR: "true"
    healthcheck:
      test: ["CMD", "curl", "-sSfL", "--head", "-o", "/dev/null", "http://localhost:4000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

