deno_subprocess_windows = { git = "https://github.com/p-hoffmann/deno", branch = "trex-v2.7.12" }
deno_tls = { git = "https://github.com/p-hoffmann/deno", branch = "trex-v2.7.12" }
node_resolver = { git = "https://github.com/p-hoffmann/deno", branch = "trex-v2.7.12" }
